# The title of the shuriken
TITLE='A simple Shuriken'

# Thumbnail height geometry
THUMBHEIGHT=300
# Normal geometry height (when viewing photo). Uncomment, to keep original size.
HEIGHT=1200
# Max previews per page.
MAXPREVIEWS=40
# Percent chance (0-100) that a thumbnail tile is subdivided into smaller
# thumbnails (a 2x2 quad, two stacked wide strips, or two squares plus one wide
# strip with the strip on top or bottom). Each sub-thumbnail is still its own
# clickable photo. 0 disables subdivision; 100 always subdivides.
THUMB_SUBDIVIDE_PERCENT=30
# Parallel jobs for image processing and HTML template rendering.
IMAGE_JOBS=3
# Timeout in seconds for each ImageMagick command.
IMAGEMAGICK_TIMEOUT=60
# Randomly shuffle all previews.
# SHUFFLE=yes
# Generate a splash landing page at index.html.
SPLASH_PAGE=yes
# Generate an EXIF stats site (stats/ overview plus per-camera and filter
# mini-albums) and show the Stats navigation link in page headers. Can be yes or
# no. Off by default; set to yes (or pass --stats) to enable it.
STATS_PAGE=no
# Set to any non-empty value for repeatable background, animation, timestamp,
# and shuffled preview choices.
# RANDOM_SEED=album-build-1

# Diverse directories, need to be full paths, not relative!
INCOMING_DIR=$(pwd)/incoming
DIST_DIR=$(pwd)/dist
TEMPLATE_DIR=/usr/share/shuriken/templates/default
#TEMPLATE_DIR=/usr/share/shuriken/templates/minimal

# Custom favicon, published as favicon.ico. Leave unset/empty to use the bundled
# shuriken favicon. Can also be set with --favicon PATH.
#FAVICON=$(pwd)/my-favicon.ico

# Source/project link shown in the page footer ("Site generated ... with <URL>").
# Defaults to the shuriken.sh repository; point it at your own album's repo if you
# like. The displayed text is the URL without its scheme. Can also be set with
# --source-url URL.
#SOURCE_URL=https://codeberg.org/snonux/shuriken.sh

# Includes a .tar of the incoming dir in the dist, can be yes or no
TARBALL_INCLUDE=yes
TARBALL_SUFFIX=.tar
# Timeout in seconds for tar archive creation.
TAR_TIMEOUT=120
TAR_OPTS=(-c)

# Destinations for `shuriken --sync`. Each destination is passed to rsync
# with DIST_DIR/ as the source, so the generated contents are copied into the
# target directory. Sync deletes removed files from destinations by default.
# SYNC_DESTINATIONS must be a Bash array, even for a single destination, e.g.
# SYNC_DESTINATIONS=( '/path/with spaces/' ). A scalar string is rejected with
# an error because word-splitting would break destinations containing spaces.
SYNC_DELETE=yes
SYNC_DESTINATIONS=(
#    admin@fishfinger.buetow.org:/var/www/htdocs/example.org/
#    admin@blowfish.buetow.org:/var/www/htdocs/example.org/
)

# Some debugging options
#set -e
#set -x
